<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunJoy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        body {font-family: 'Inter', sans-serif; background:#0a0a0c; color:#f4f4f5; margin:0;}
        .glass {background:rgba(255,255,255,0.08); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.1);}
        .title {font-family:'Space Grotesk',sans-serif;}
    </style>
</head>
<body class="max-w-md mx-auto">
    <header class="sticky top-0 z-50 p-6 glass flex items-center gap-4 border-b border-white/10">
        <div class="text-4xl">🏃‍♂️</div>
        <div>
            <h1 class="title text-4xl font-bold">RunJoy</h1>
            <p class="text-orange-400 text-xs">LIVE GPS TRACKER</p>
        </div>
    </header>

    <div class="p-6">
        <div class="glass rounded-3xl p-6 mb-8 text-center">
            <div id="status" class="font-medium">Tap START to track your run</div>
            <div class="grid grid-cols-3 gap-6 mt-8">
                <div class="text-center">
                    <div id="dist" class="text-4xl font-bold text-orange-400">0.00</div>
                    <div class="text-xs text-zinc-400">KM</div>
                </div>
                <div class="text-center">
                    <div id="pace" class="text-4xl font-bold">—</div>
                    <div class="text-xs text-zinc-400">PACE</div>
                </div>
                <div class="text-center">
                    <div id="time" class="text-4xl font-bold">00:00</div>
                    <div class="text-xs text-zinc-400">TIME</div>
                </div>
            </div>
        </div>

        <div id="map" class="h-80 rounded-3xl border border-white/10 mb-8"></div>

        <div class="flex gap-4">
            <button onclick="startRun()" id="startBtn" class="flex-1 py-7 bg-red-500 hover:bg-red-600 rounded-3xl text-xl font-bold">START RUN</button>
            <button onclick="stopRun()" class="flex-1 py-7 glass rounded-3xl text-xl font-bold">STOP</button>
        </div>

        <button onclick="saveRun()" class="mt-8 w-full py-6 glass rounded-3xl text-lg font-medium">SAVE RUN</button>
    </div>

    <script>
        let map, routeLine, watchId = null;
        let totalDist = 0, lastPos = null, startTime = null, timer = null;

        function initMap() {
            map = L.map('map').setView([37.77, -122.42], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            routeLine = L.polyline([], {color: '#f97316', weight: 7}).addTo(map);
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function startRun() {
            if (!navigator.geolocation) return alert("GPS not supported on this browser");

            document.getElementById("startBtn").textContent = "RUNNING LIVE";
            startTime = Date.now();

            timer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(elapsed / 60);
                const s = elapsed % 60;
                document.getElementById("time").textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);

            watchId = navigator.geolocation.watchPosition(pos => {
                const {latitude, longitude} = pos.coords;
                if (lastPos) {
                    totalDist += haversine(lastPos.lat, lastPos.lon, latitude, longitude);
                    document.getElementById("dist").textContent = totalDist.toFixed(2);
                }
                lastPos = {lat: latitude, lon: longitude};
                routeLine.addLatLng([latitude, longitude]);
                map.flyTo([latitude, longitude], 16);
            }, e => alert("GPS Error: " + e.message), {enableHighAccuracy: true});
        }

        function stopRun() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (timer) clearInterval(timer);
            document.getElementById("startBtn").textContent = "START RUN";
        }

        function saveRun() {
            if (totalDist < 0.1) return alert("Keep running a bit more!");
            alert(`Run Saved!\nDistance: ${totalDist.toFixed(2)} km`);
        }

        window.onload = initMap;
    </script>
</body>
</html>
